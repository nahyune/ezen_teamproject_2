<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- 홈 화면 추가 아이콘 — iOS(apple-touch-icon PNG) / 안드로이드(manifest SVG) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d0d0f" />
    <meta name="apple-mobile-web-app-title" content="W:RUN" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- 지도·러닝 등 몰입 화면이 상태바 아래까지 꽉 차야 하므로 translucent 유지.
         (이때 iOS standalone 은 하단에 상태바 높이만큼 빈 띠를 남기는 버그가 있어
          App.css 의 .phone-frame 모바일 규칙에서 그만큼 보정한다) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&display=swap"
      rel="stylesheet"
    />
    <title>W:RUN — 메인 홈</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
